# fly.toml app configuration file generated for europe-quiz on 2026-05-10T22:07:59Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'europe-quiz'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '2567'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
