# Fly.io config for the Colyseus game server.
# Build context = repo root (where this file lives), so the Dockerfile can
# pull in the workspace packages.

app = 'europe-quiz'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '2567'

[http_service]
  # MUST equal the PORT env var above — Fly forwards external 80/443 to
  # this internal port, and our server listens on $PORT (= 2567). Earlier
  # mismatch (internal_port=8080 / PORT=2567) was why health checks timed out.
  internal_port = 2567
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  # 256MB is too tight — Node + Prisma's schema engine + tsx blow past it
  # on cold start (machine logs showed "Out of memory: Killed process node").
  # 512MB is the sweet spot for a small Colyseus + Prisma app.
  memory = '512mb'
